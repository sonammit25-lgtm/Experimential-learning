<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experimential Learing</title>
</head>
<body>
    <header>
  <center>
    <h1>🎓 Workshop Registration Portal 🎓</h1>
    <p><b>Enhance Your Skills • Learn • Grow</b></p>
    <hr width="60%">
    
    <marquee behavior="scroll" direction="left">
      🔔 Limited Seats Available | Register Now | Secure Your Spot Today 🔔
    </marquee>
    
    <hr width="60%">
  </center>
</header>
   
<form action:="#" method="post">
    <fieldset>
    <legend>Personal Details</legend>
    <label for="name">Full Name:</label><br>
    <input type="text" id="name" name="name" placeholder="Enter your full name" size = "120" required autocomplete="name"><br>

    <label for="age">Age:</label><br>
    <input type="number" id="age" name="age" min="0" required><br>

    <label for="gender">Gender:</label><br>
    <select id="gender" name="gender" required>
      <option value="">--Select Gender--</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="other">Other</option>
    </select><br>

    <label for="address">Address:</label><br>
    <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your address" required></textarea><br> 

    <label for="email">Email Address:</label><br>
    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email"><br>
    
    <label for="phone">Phone Number:</label><br>
    <input type="tel" id="phone" name="phone" pattern="^\d{10}$" placeholder="10-digit phone number" required autocomplete="tel"><br>
    </fieldset>
    </form>
    <form action: "#" method="post">
    <fieldset>
      <legend>Credit Card Details</legend>
      <label for="cardnumber">Card Number:</label><br>
      <input type="text" id="cardnumber" name="cardnumber" maxlength="16" pattern="^\d{16}$" placeholder="16-digit card number" required><br>

      <label for="expiry">Expiry Date (MM/YY):</label><br>
      <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required><br>

      <label for="cvv">CVV:</label><br>
      <input type="password" id="cvv" name="cvv" maxlength="3" pattern="^\d{3}$" placeholder="Enter CVV" required><br>
    </fieldset>

    <fieldset>
      <legend>Net Banking Details</legend>
      <label for="bank">Select Bank:</label><br>
      <select id="bank" name="bank">
        <option value="">--Choose Bank--</option>
        <option value="sbi">State Bank of India</option>
        <option value="icici">ICICI Bank</option>
        <option value="hdfc">HDFC Bank</option>
        <option value="axis">Axis Bank</option>
      </select><br>

      <label for="userid">User ID:</label><br>
      <input type="text" id="userid" name="userid"><br>

      <label for="password">Password:</label><br>
      <input type="password" id="password" name="password"><br>
    </fieldset>
</form>
</body>
</html>
